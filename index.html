<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinevia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">Cinevia</div>
        <ul class="nav-links">
            <li><a href="#" class="active">Accueil</a></li>
            <li><a href="#">Films</a></li>
            <li><a href="#">Favoris</a></li>
        </ul>
        <div class="search-bar">
            <input type="text" placeholder="Rechercher...">
        </div>
    </nav>

    <section id="Accueil" class="hero">
        <img src="image/back.jpg" alt="cinevia">
        <div class="hero-content">
            <h1>Découvrez les meilleurs films 🎥</h1>
            <p>Explorez, recherchez et ajoutez vos films préférés</p>
            <button>Explorer maintenant</button>
        </div>
    </section>
</header>
<main>

    <section class="filters-container">
        <div class="filters">
            <button class="filter-btn active">Tous</button>
            <button class="filter-btn">Action</button>
            <button class="filter-btn">Comédie</button>
            <button class="filter-btn">Drame</button>
        </div>
    </section>

    <section class="movies-container"> 
    <h2 class="section-title">Films populaires</h2>
    <div class="movie-grid" id="movie-container"></div>
</section>

    <section id="Favoris" class="favorites">
        <h2 class="section-title">Mes Favoris ❤️</h2>
        <div class="movie-grid" id="movie-grid-fav"></div>
    </section>



<div id="modal" class="modal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <img id="modal-img" src="" alt="">
        <div class="modal-info"> <h2 id="modal-title"></h2>
            <p id="modal-category" style="color: #e11d48; margin-bottom: 10px;"></p>
            <p id="modal-description"></p>
            <button id="add-fav">Ajouter aux Favoris ❤️</button>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Cinevia - Tous droits réservés</p>
</footer>
</main>
<script src="script.js"></script>
</body>
</html>
