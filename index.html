<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinevia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">Cinevia</div>
        <ul class="nav-links">
            <li><a href="#Accueil" class="active">Accueil</a></li>
            <li><a href="#films">Films</a></li>
            <li><a href="#Favoris">Favoris</a></li>
        </ul>
        
    </nav>

    <section id="Accueil" class="hero">
        <img src="image/back.jpg" alt="cinevia">
        <div class="hero-content">
            <h1>Découvrez les meilleurs films 🎥</h1>
            <p>Explorez, recherchez et ajoutez vos films préférés</p>
            <button>Explorer maintenant</button>
        </div>
    </section>
</header>
<main>
<div id="filters-wrapper">
    <section class="filters-container">
        <button onclick="filterMovies('Tous')">Tous</button>
        <button onclick="filterMovies('Action')">Action</button>
        <button onclick="filterMovies('Comédie')">Comédie</button>
        <button onclick="filterMovies('Drame')">Drame</button>
    </section>
</div>
    <section id="films" class="movies-container"> 
    <h2 class="section-title">Films populaires</h2>
</section>
<div class="movie-grid" id="movie-container"></div>
    <section id="Favoris" class="favorites">
        <h2 class="section-title">Mes Favoris ❤️</h2>
        <div class="movie-grid" id="movie-grid-fav"></div>
    </section>



<div id="modal" class="modal">
  <div class="modal-content">
    <span id="close">&times;</span>
    
    <img id="modal-img" src="" alt="">
    <h2 id="modal-titre"></h2>
    <p id="modal-categorie"></p>
    <p id="modal-description"></p> 
     <button class="btn" id="add-fav"> Ajouter aux favoris❤️</button>

  </div>
</div>

<footer>
    <p>&copy; 2026 Cinevia - Tous droits réservés</p>
</footer>
</main>
<script src="script.js"></script>
</body>
</html>
